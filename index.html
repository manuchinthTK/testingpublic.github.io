<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Command Executor</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #0d1117;
            color: #c9d1d9;
        }
        .auth-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .auth-btn {
            background-color: #238636;
            color: white;
            border: none;
            padding: 8px 16px;
            margin: 0 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        .auth-btn.active {
            background-color: #1f6feb;
        }
        .terminal {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
            min-height: 200px;
        }
        #output {
            white-space: pre-wrap;
            line-height: 1.5;
        }
        .command-area {
            display: none;
        }
        .command-area.active {
            display: block;
        }
        .user-command {
            background-color: #238636;
        }
        .root-command {
            background-color: #da3633;
        }
        input {
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px;
            border-radius: 4px;
            margin-right: 10px;
            font-family: 'Courier New', monospace;
        }
        button {
            font-family: 'Courier New', monospace;
        }
        .success {
            color: #3fb950;
        }
        .error {
            color: #f85149;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <button id="userBtn" class="auth-btn active">User Mode</button>
        <button id="rootBtn" class="auth-btn">Root Mode</button>
    </div>

    <div class="terminal">
        <div id="output">$ Select a mode to begin</div>
    </div>

    <!-- User Command Area -->
    <div id="userCommands" class="command-area active">
        <h3>User Commands</h3>
        <button onclick="executeUserCommand()" class="user-command">Run mypy.py (Default Sum)</button>
    </div>

    <!-- Root Command Area -->
    <div id="rootCommands" class="command-area">
        <h3>Root Commands</h3>
        <input type="number" id="customNumber" placeholder="Enter a number">
        <button onclick="executeRootCommand()" class="root-command">Run mypy.py (Custom Sum)</button>
    </div>

    <script>
        // DOM Elements
        const outputEl = document.getElementById('output');
        const userBtn = document.getElementById('userBtn');
        const rootBtn = document.getElementById('rootBtn');
        const userCommands = document.getElementById('userCommands');
        const rootCommands = document.getElementById('rootCommands');
        const customNumberEl = document.getElementById('customNumber');

        // Current mode (default: user)
        let currentMode = 'user';

        // Mode switching
        userBtn.addEventListener('click', () => switchMode('user'));
        rootBtn.addEventListener('click', () => switchMode('root'));

        function switchMode(mode) {
            currentMode = mode;
            userBtn.classList.toggle('active', mode === 'user');
            rootBtn.classList.toggle('active', mode === 'root');
            userCommands.classList.toggle('active', mode === 'user');
            rootCommands.classList.toggle('active', mode === 'root');
            outputEl.innerHTML += `\n$ Switched to ${mode} mode`;
            outputEl.scrollTop = outputEl.scrollHeight;
        }

        // Command execution
        function executeUserCommand() {
            outputEl.innerHTML += `\n$ Executing mypy.py with default values`;
            simulateExecution('user');
        }

        function executeRootCommand() {
            const num = customNumberEl.value;
            if (!num) {
                outputEl.innerHTML += `\n<span class="error">$ Error: Please enter a number</span>`;
                return;
            }
            outputEl.innerHTML += `\n$ Executing mypy.py with custom value: ${num}`;
            simulateExecution('root', num);
        }

        // Simulate command execution
        function simulateExecution(mode, customNum = null) {
            // Default numbers for sum
            const a = 10;
            const b = 20;
            let sum;

            if (mode === 'user') {
                sum = a + b;
                outputEl.innerHTML += `\n<span class="success">$ Result: ${a} + ${b} = ${sum}</span>`;
            } else {
                sum = a + b + parseInt(customNum);
                outputEl.innerHTML += `\n<span class="success">$ Result: ${a} + ${b} + ${customNum} = ${sum}</span>`;
            }

            outputEl.innerHTML += '\n$ ';
            outputEl.scrollTop = outputEl.scrollHeight;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            outputEl.innerHTML += '\n$ ';
        });
    </script>
</body>
</html>
