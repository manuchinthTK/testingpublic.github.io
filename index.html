<!DOCTYPE html>
<html>
<head>
    <title>Python Script Runner</title>
    <script src="script.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        button { padding: 10px 15px; font-size: 16px; }
        #output { 
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            white-space: pre-wrap;
            min-height: 100px;
        }
    </style>
</head>
<body>
    <h1>Python Script Runner</h1>
    <button onclick="runScript()">Run Script via GitHub Actions</button>
    <div id="output">Click button to run script</div>
    
    <p><small>Note: This triggers a GitHub Actions workflow which may take 1-2 minutes to complete.</small></p>
</body>
</html>
