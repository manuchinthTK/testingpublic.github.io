name: Run Python Script

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [ main ]
    paths: 
      - 'scripts/mypy.py'  # Auto-run when Python script changes

jobs:
  execute-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Execute script
        run: |
          python scripts/mypy.py > scripts/output.txt
          echo "Last run: $(date)" >> scripts/output.txt
      
      - name: Commit results
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add scripts/output.txt
          git commit -m "Update script output" || echo "No changes to commit"
          git push
