name: Run Python Script

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'scripts/mypy.py'

jobs:
  execute-script:
    runs-on: ubuntu-latest
    permissions:  # ← Crufix fix!
      contents: write  # Allows pushing changes
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Gets full git history

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Execute script
        run: |
          python scripts/mypy.py > scripts/output.txt
          echo "Last updated: $(date)" >> scripts/output.txt

      - name: Commit and push results
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # Check for actual changes
          git diff --quiet && git diff --cached --quiet || {
            git add scripts/output.txt
            git commit -m "Update script output [skip ci]"
            git push
          }
